<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon 東京冒險軌跡</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Google Fonts (日系感 Noto Sans JP) -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    body {
      font-family: 'Noto Sans JP', sans-serif;
    }
    /* 隱藏滾動條但保留滾動功能 (用於橫向滑動選單) */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

  <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col pb-12">
    
    <!-- 頂部導覽列 -->
    <header class="sticky top-0 bg-white/95 backdrop-blur border-b border-emerald-100 px-4 py-3 z-10">
      <div class="flex items-center justify-between">
        <h1 class="text-lg font-bold text-emerald-800 tracking-wider">寶可夢地圖軌跡</h1>
        <span class="text-xs bg-emerald-100 text-emerald-800 px-2 py-1 rounded-full font-medium">東京朝聖線</span>
      </div>
    </header>

    <!-- App 風格：橫向滑動日期/路線選單 -->
    <div class="bg-emerald-50/50 py-3 border-b border-emerald-100">
      <div class="flex space-x-3 overflow-x-auto px-4 no-scrollbar">
        <button 
          v-for="(day, index) in days" 
          :key="index"
          @click="activeDay = index"
          :class="[
            'px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-all duration-200 shrink-0',
            activeDay === index 
              ? 'bg-emerald-600 text-white shadow-sm shadow-emerald-200' 
              : 'bg-white text-emerald-700 border border-emerald-200 hover:bg-emerald-50'
          ]"
        >
          {{ day.name }}
        </button>
      </div>
    </div>

    <!-- 主內容區 -->
    <main class="flex-1 p-5">
      
      <!-- 總覽與一鍵導航卡片 -->
      <div class="bg-emerald-50/40 border border-emerald-100 rounded-2xl p-4 mb-6">
        <h2 class="text-sm font-bold text-emerald-900 mb-1">🗺️ 7站大滿貫串聯路線</h2>
        <p class="text-xs text-emerald-700/80 mb-3 leading-relaxed">
          已將所有寶可夢中心與站點打包！點擊下方按鈕即可在 Google Maps 中開啟一鍵導航。
        </p>
        <a 
          :href="googleMapsFullUrl" 
          target="_blank"
          class="inline-flex items-center justify-center w-full py-2.5 px-4 bg-emerald-600 hover:bg-emerald-700 active:scale-[0.98] transition-all text-white text-sm font-medium rounded-xl shadow-sm gap-2"
        >
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
          </svg>
          開啟 Google Maps 完整導航
        </a>
      </div>

      <!-- 垂直軌跡圖 (Timeline) -->
      <div class="relative pl-6 border-l-2 border-emerald-100 ml-3 space-y-6">
        
        <!-- 軌跡節點 -->
        <div 
          v-for="(spot, index) in spots" 
          :key="spot.id" 
          class="relative group"
        >
          <!-- 節點圓點 -->
          <div class="absolute -left-[31px] top-1.5 bg-white border-2 border-emerald-500 rounded-full w-4.5 h-4.5 flex items-center justify-center transition-all group-hover:scale-110">
            <div class="bg-emerald-500 rounded-full w-2 h-2"></div>
          </div>

          <!-- 節點編號與名稱 -->
          <div class="flex items-start justify-between gap-4">
            <div>
              <div class="flex items-center gap-1.5 mb-1">
                <span class="text-xs font-bold text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded">
                  {{ String(index + 1).padStart(2, '0') }}
                </span>
                <h3 class="text-sm font-bold text-gray-900 group-hover:text-emerald-700 transition-colors">
                  {{ spot.name }}
                </h3>
              </div>
              
              <!-- 鄰近地鐵與座標等備註 -->
              <div class="text-xs text-gray-500 space-y-0.5">
                <p v-if="spot.station" class="flex items-center gap-1">
                  <span>📍 最近：</span>
                  <span class="text-gray-700 font-medium">{{ spot.station }}</span>
                </p>
                <p class="text-[11px] text-gray-400 font-mono">
                  Coords: {{ spot.lat }}, {{ spot.lng }}
                </p>
                <p v-if="spot.note" class="text-amber-600 bg-amber-50 px-2 py-1 rounded mt-1.5 text-[11px] inline-block font-medium">
                  💡 {{ spot.note }}
                </p>
              </div>
            </div>

            <!-- 單點地圖跳轉按鈕 -->
            <a 
              :href="`https://www.google.com/maps/search/?api=1&query=${spot.lat},${spot.lng}`" 
              target="_blank"
              class="shrink-0 p-2 text-emerald-600 hover:bg-emerald-50 active:bg-emerald-100 rounded-xl transition-all border border-emerald-100"
              title="地圖定位"
            >
              <svg class="w-4 h-4 fill-none stroke-current stroke-2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
              </svg>
            </a>
          </div>

          <!-- 區間交通線 (最後一站除外) -->
          <div 
            v-if="index < spots.length - 1" 
            class="mt-4 -mb-2 py-1 px-3 bg-gray-50 border border-gray-100 rounded-xl inline-flex items-center gap-2 text-xs text-gray-500"
          >
            <!-- 交通方式 Icon -->
            <span class="text-emerald-500 font-bold">⬇️</span>
            <span>{{ spot.nextTransport }}</span>
          </div>

        </div>

      </div>

    </main>

  </div>

  <script>
    const { createApp, ref } = Vue;

    createApp({
      setup() {
        const activeDay = ref(0);

        // 橫向滑動選單資料 (可對接你原有的行程日期)
        const days = ref([
          { name: 'Day 1: 抵達與探路' },
          { name: 'Day 2: 寶可夢大滿貫' },
          { name: 'Day 3: 澀谷/橫濱放風' },
          { name: 'Day 4: 買好買滿回程' }
        ]);

        // 寶可夢 7 個軌跡點詳細資料
        const spots = ref([
          {
            id: 1,
            name: 'Pokémon Center TOKYO DX (日本橋)',
            lat: 35.6849,
            lng: 139.7731,
            station: '東京站、日本橋站',
            nextTransport: '地鐵約 20 分鐘',
            note: null
          },
          {
            id: 2,
            name: 'Pokémon Center TOKYO SKYTREE TOWN',
            lat: 35.7101,
            lng: 139.8107,
            station: '押上站 (晴空塔前)',
            nextTransport: '地鐵約 25–30 分鐘',
            note: '抵達後轉活動轉盤'
          },
          {
            id: 3,
            name: 'Pokémon Center MEGA TOKYO (池袋)',
            lat: 35.7299,
            lng: 139.7190,
            station: '池袋站、東池袋站',
            nextTransport: '步行約 5 分鐘',
            note: null
          },
          {
            id: 4,
            name: 'Pokémon GO Lab. (池袋 Sunshine City)',
            lat: 35.7290995,
            lng: 139.7186977,
            station: '池袋站 (Sunshine City 內)',
            nextTransport: 'JR 山手線約 20 分鐘',
            note: '和 MEGA TOKYO 同在 Sunshine City 2 樓內，不用搭車！'
          },
          {
            id: 5,
            name: 'Pokémon Center Shibuya',
            lat: 35.6595,
            lng: 139.6995,
            station: '澀谷站 (澀谷 PARCO 6F)',
            nextTransport: 'JR 約 40–50 分鐘',
            note: null
          },
          {
            id: 6,
            name: 'Pokémon Center Yokohama',
            lat: 35.4551,
            lng: 139.6318,
            station: '橫濱站 (Sky Building 8F)',
            nextTransport: 'JR 京葉線約 40–50 分鐘',
            note: null
          },
          {
            id: 7,
            name: 'Pokémon Center TOKYO-BAY (南船橋)',
            lat: 35.6867,
            lng: 139.9908,
            station: '南船橋站 (Lalaport TOKYO-BAY)',
            nextTransport: null,
            note: '最終朝聖終點！'
          }
        ]);

        // 串聯 7 個點的 Google Maps 完整規劃 URL
        const googleMapsFullUrl = ref("https://www.google.com/maps/dir/Pok%C3%A9mon+Center+Tokyo+DX,+%E9%AB%99%E5%B3%B6%E5%B1%8BS.C.%E6%9D%B1%E9%A4%A8+5F,+%EF%BC%92%E4%B8%81%E7%9B%AE-%EF%BC%91%EF%BC%91-2+%E6%97%A5%E6%9C%AC%E6%A9%8B,+%E5%B0%82%E9%96%80%E5%BA%97%E8%A1%97%E3%82%A2%E3%83%AB%E3%83%91+2F/Pok%C3%A9mon+Center+Skytree/Pok%C3%A9mon+Center+Mega+Tokyo/Pok%C3%A9mon+GO+Lab./Pokemon+Center+Shibuya/Pok%C3%A9mon+Center+Yokohama/Pok%C3%A9mon+Center+Tokyo+Bay");

        return {
          activeDay,
          days,
          spots,
          googleMapsFullUrl
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
