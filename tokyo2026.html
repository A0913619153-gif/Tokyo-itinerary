<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>東京旅行行程表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    body {
      font-family: 'Noto Sans JP', sans-serif;
    }
    /* 隱藏滾動條但保留滾動功能 (用於橫向滑動選單) */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

  <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col pb-12">
    
    <header class="sticky top-0 bg-white/95 backdrop-blur border-b border-emerald-100 px-4 py-3 z-10">
      <div class="flex items-center justify-between">
        <h1 class="text-lg font-bold text-emerald-800 tracking-wider">我的東京旅行</h1>
        <span class="text-xs bg-emerald-100 text-emerald-800 px-2 py-1 rounded-full font-medium">日系極簡風</span>
      </div>
    </header>

    <div class="bg-emerald-50/30 py-3 border-b border-emerald-100">
      <div class="flex space-x-3 overflow-x-auto px-4 no-scrollbar">
        <button 
          v-for="(day, index) in itineraryDays" 
          :key="index"
          @click="activeDay = index"
          :class="[
            'px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-all duration-200 shrink-0',
            activeDay === index 
              ? 'bg-emerald-600 text-white shadow-sm shadow-emerald-200' 
              : 'bg-white text-emerald-700 border border-emerald-200 hover:bg-emerald-50'
          ]"
        >
          {{ day.date }} {{ day.title }}
        </button>
      </div>
    </div>

    <main class="flex-1 p-5 space-y-6">
      
      <section class="bg-white rounded-2xl border border-gray-100 p-4 shadow-sm">
        <div class="flex items-center justify-between mb-3 pb-2 border-b border-gray-100">
          <h2 class="font-bold text-gray-900 text-base">
            📅 {{ itineraryDays[activeDay] ? itineraryDays[activeDay].date : '' }} 行程安排
          </h2>
          <span class="text-xs text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full font-medium">
            {{ itineraryDays[activeDay] ? itineraryDays[activeDay].title : '' }}
          </span>
        </div>
        
        <div class="space-y-4" v-if="itineraryDays[activeDay]">
          <div v-for="(item, i) in itineraryDays[activeDay].activities" :key="i" class="flex gap-3 items-start">
            <span class="text-xs font-bold text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-lg mt-0.5 whitespace-nowrap">
              {{ item.time }}
            </span>
            <div class="flex-1">
              <h4 class="text-sm font-bold text-gray-800">{{ item.name }}</h4>
              <p class="text-xs text-gray-400 mt-1 leading-relaxed">{{ item.desc }}</p>
            </div>
          </div>
        </div>
      </section>

      <section class="border border-emerald-100 rounded-2xl overflow-hidden bg-white shadow-sm">
        <button 
          @click="isPokemonOpen = !isPokemonOpen"
          class="w-full flex items-center justify-between p-4 bg-emerald-50/50 hover:bg-emerald-50 transition-colors focus:outline-none"
        >
          <div class="flex items-center gap-2.5">
            <span class="text-xl">⚡</span>
            <div class="text-left">
              <h3 class="font-bold text-sm text-emerald-950">寶可夢 7 站大滿貫朝聖軌跡</h3>
              <p class="text-[11px] text-emerald-700/70">點擊展開完整朝聖地圖與路線軌跡</p>
            </div>
          </div>
          <svg 
            class="w-5 h-5 text-emerald-600 transition-transform duration-300"
            :class="{ 'rotate-180': isPokemonOpen }"
            fill="none" 
            viewBox="0 0 24 24" 
            stroke="currentColor"
          >
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </button>
