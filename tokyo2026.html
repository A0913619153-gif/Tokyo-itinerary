<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>東京 7 天 6 夜自由行 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { colors: { aquagreen: { 50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4', 300: '#5eead4', 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e', } }, fontFamily: { sans: ['Noto Sans TC', 'sans-serif'], } } } }
  </script>
  <style> .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; } </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen pb-12">
  <div id="app" class="max-w-md mx-auto bg-white shadow-xl min-h-screen flex flex-col relative">
    <header class="bg-gradient-to-r from-aquagreen-500 to-aquagreen-600 text-white p-6 rounded-b-[2rem] shadow-md">
      <div class="flex justify-between items-start">
        <div>
          <span class="bg-aquagreen-700 bg-opacity-40 text-xs px-3 py-1 rounded-full font-medium">Tokyo Adventure 2026</span>
          <h1 class="text-2xl font-bold mt-2">東京 7 天 6 夜自由行</h1>
          <p class="text-xs text-aquagreen-100 mt-1">2026.07.19 – 07.25 | 喬宇 & 芝穎</p>
        </div>
        <div class="text-right">
          <span class="text-xs block text-aquagreen-100">預估氣溫</span>
          <span class="text-lg font-bold">32-36°C ☀️</span>
        </div>
      </div>
    </header>

    <main class="p-4 flex-1 space-y-4">
      <!-- 日期滑動選擇區 -->
      <div class="py-1">
        <h3 class="text-xs font-bold text-slate-400 mb-2 px-1 uppercase tracking-wider">選擇行程日期</h3>
        <div class="flex space-x-2 overflow-x-auto no-scrollbar pb-2 px-1 snap-x">
          <button v-for="(day, index) in itinerary" :key="index" @click="activeDay = index" class="flex-shrink-0 w-20 py-3 rounded-2xl flex flex-col items-center justify-center transition-all duration-300 snap-center shadow-sm" :class="activeDay === index ? 'bg-aquagreen-500 text-white font-bold scale-105 shadow-md shadow-aquagreen-100' : 'bg-white border border-slate-200 text-slate-500'">
            <span class="text-[9px] uppercase opacity-80">Day {{ day.dayNum }}</span>
            <span class="text-sm my-0.5">{{ day.date }}</span>
            <span class="text-[9px] opacity-90">{{ day.week }}</span>
          </button>
        </div>
      </div>

      <!-- 導航卡片 -->
      <div class="bg-gradient-to-br from-slate-800 to-slate-900 text-white rounded-2xl p-4 shadow-md flex items-center justify-between">
        <div class="space-y-1">
          <span class="text-[10px] bg-aquagreen-500 text-white px-2 py-0.5 rounded-full font-bold">Google Maps 軌跡</span>
          <h4 class="text-xs font-bold">開啟 Day {{ currentDay.dayNum }} 路線導航</h4>
        </div>
        <a :href="currentDay.mapUrl" target="_blank" class="bg-aquagreen-500 hover:bg-aquagreen-600 transition-transform text-white font-bold text-xs px-4 py-3 rounded-xl shadow-md">🗺️ 開啟導航</a>
      </div>

      <!-- 每日行程 -->
      <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 space-y-4">
        <div class="border-b border-slate-100 pb-3">
          <span class="bg-aquagreen-100 text-aquagreen-700 text-xs font-bold px-2.5 py-1 rounded-full">Day {{ currentDay.dayNum }}</span>
          <h2 class="text-lg font-bold text-slate-800 mt-2">{{ currentDay.theme }}</h2>
        </div>
        <div class="space-y-4 relative before:absolute before:inset-0 before:left-3.5 before:w-0.5 before:bg-slate-100">
          <div v-for="(item, idx) in currentDay.timeline" :key="idx" class="flex space-x-4 relative items-start">
            <div class="w-7 h-7 flex-shrink-0 rounded-full bg-white border-2 border-aquagreen-500 flex items-center justify-center z-10 text-[10px] text-aquagreen-600 font-bold">{{ idx + 1 }}</div>
            <div class="flex-1 bg-slate-50 p-3 rounded-xl">
              <div class="text-xs font-bold text-aquagreen-600 mb-1">{{ item.time }}</div>
              <h4 class="text-xs font-bold text-slate-800">{{ item.title }}</h4>
              <p class="text-[11px] text-slate-500 mt-1 leading-relaxed">{{ item.desc }}</p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const { createApp, ref, computed } = Vue;
    createApp({
      setup() {
        const activeDay = ref(0);
        const itinerary = ref([
          { dayNum: "1", date: "7/19", week: "週日", theme: "澀谷配鏡與夜景", mapUrl: "https://www.google.com/maps/dir/?api=1&origin=Narita+Airport+Terminal+1&destination=Shibuya+Station&waypoints=Hikifune+Station&travelmode=transit", timeline: [
            { time: "12:30", title: "機場前往住宿", desc: "[交通：成田機場站 ➔ 押上站 (京成線) ➔ 步行至曳舟住宿]" },
            { time: "14:15", title: "前往澀谷", desc: "[交通：曳舟站 ➔ 澀谷站 (半藏門線直達)]" },
            { time: "19:00", title: "返回旅館", desc: "[交通：澀谷站 ➔ 曳舟站 (半藏門線直達)]" }
          ]},
          { dayNum: "2", date: "7/20", week: "週一", theme: "三麗鷗彩虹樂園", mapUrl: "https://www.google.com/maps/dir/?api=1&origin=Hikifune+Station&destination=Shinjuku+Station&waypoints=Tama-Center+Station&travelmode=transit", timeline: [
            { time: "08:30", title: "出發多摩中心", desc: "[交通：曳舟站 ➔ 神保町站 (半藏門線) ➔ 新宿線 ➔ 多摩中心站]" },
            { time: "17:00", title: "移動至新宿", desc: "[交通：多摩中心站 ➔ 新宿站 (京王線)]" },
            { time: "21:00", title: "返回旅館", desc: "[交通：新宿站 ➔ 神保町站 (新宿線) ➔ 曳舟站 (半藏門線)]" }
          ]},
          { dayNum: "3", date: "7/21", week: "週二", theme: "迪士尼樂園 (Land)", mapUrl: "https://www.google.com/maps/dir/?api=1&origin=Tokyo+Skytree+Town+Bus+Terminal&destination=Tokyo+Disneyland&travelmode=driving", timeline: [
            { time: "07:30", title: "搭乘直達巴士", desc: "[交通：晴空塔巴士轉運站 ➔ 東京迪士尼樂園巴士站 (直達)]" },
            { time: "21:30", title: "返回旅館", desc: "[交通：東京迪士尼樂園巴士站 ➔ 晴空塔巴士轉運站 (直達)]" }
          ]},
          { dayNum: "4", date: "7/22", week: "週三", theme: "淺草上野秋葉原", mapUrl: "https://www.google.com/maps/dir/?api=1&origin=Hikifune+Station&destination=Hikifune+Station&waypoints=Asakusa+Station|Ueno+Station|Akihabara+Station&travelmode=transit", timeline: [
            { time: "09:30", title: "前往淺草", desc: "[交通：曳舟站 ➔ 淺草站 (都營淺草線)]" },
            { time: "12:00", title: "前往上野", desc: "[交通：淺草站 ➔ 上野站 (銀座線)]" },
            { time: "16:30", title: "前往秋葉原", desc: "[交通：上野站 ➔ 秋葉原站 (JR 山手線)]" },
            { time: "18:00", title: "返回旅館", desc: "[交通：秋葉原站 ➔ 淺草橋站 (JR) ➔ 押上站 (都營淺草線) ➔ 曳舟站]" }
          ]},
          { dayNum: "5", date: "7/23", week: "週四", theme: "迪士尼海洋 (Sea)", mapUrl: "https://www.google.com/maps/dir/?api=1&origin=Tokyo+Skytree+Town+Bus+Terminal&destination=Tokyo+DisneySea&travelmode=driving", timeline: [
            { time: "07:30", title: "搭乘直達巴士", desc: "[交通：晴空塔巴士轉運站 ➔ 東京迪士尼海洋巴士站 (直達)]" },
            { time: "21:30", title: "返回旅館", desc: "[交通：東京迪士尼海洋巴士站 ➔ 晴空塔巴士轉運站 (直達)]" }
          ]},
          { dayNum: "6", date: "7/24", week: "週五", theme: "東京鐵塔與購物", mapUrl: "https://www.google.com/maps/dir/?api=1&origin=Hikifune+Station&destination=Hikifune+Station&waypoints=Omotesando+Station|Shinbashi+Station|Akabanebashi+Station&travelmode=transit", timeline: [
            { time: "09:30", title: "前往表參道", desc: "[交通：曳舟站 ➔ 表參道站 (半藏門線直達)]" },
            { time: "12:30", title: "前往新橋/烏森", desc: "[交通：表參道站 ➔ 新橋站 (銀座線直達)]" },
            { time: "15:00", title: "前往東京鐵塔", desc: "[交通：新橋站 ➔ 赤羽橋站 (都營大江戶線)]" },
            { time: "20:00", title: "返回旅館", desc: "[交通：赤羽橋站 ➔ 六本木 ➔ 押上 ➔ 曳舟站]" }
          ]},
          { dayNum: "7", date: "7/25", week: "週六", theme: "築地與返台", mapUrl: "https://www.google.com/maps/dir/?api=1&origin=Tsukiji+Station&destination=Narita+Airport+Terminal+1&waypoints=Ginza+Station|Hikifune+Station|Keisei-Ueno+Station&travelmode=transit", timeline: [
            { time: "08:00", title: "築地早餐", desc: "[交通：曳舟站 ➔ 築地站 (半藏門線/日比谷線)]" },
            { time: "10:00", title: "前往銀座", desc: "[交通：築地站 ➔ 銀座站 (日比谷線)]" },
            { time: "11:30", title: "回旅館取行李", desc: "[交通：銀座站 ➔ 曳舟站 (銀座線 ➔ 半藏門線)]" },
            { time: "16:00", title: "前往機場", desc: "[交通：曳舟站 ➔ 京成上野站 (計程車/地鐵) ➔ 成田機場 (Skyliner)]" }
          ]}
        ]);
        const currentDay = computed(() => itinerary.value[activeDay.value]);
        return { activeDay, itinerary, currentDay };
      }
    }).mount('#app');
  </script>
</body>
</html>
