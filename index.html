              { time: "12:30", title: "地鐵銀座線直達新橋", desc: "步行 2 分鐘到<strong>烏森神社</strong>購入罕見的黑色「癌封じ」御守（請在15:30前抵達）。" },
              { time: "15:00", title: "東京鐵塔地標美照", desc: "前往東京鐵塔與經典地標合照、欣賞最美日落夜景。" },
              { time: "20:00", title: "回旅館收拾行李", desc: "返回曳舟旅館，收拾整理好全部大行李，迎接明天的大撤離。" }
            ]
          },
          {
            dayNum: "7",
            date: "7/25",
            week: "週六",
            fullDate: "2026.07.25 (Sat)",

              { time: "11:30", title: "⚡ 急！回旅館撤離大行李", desc: "<strong>下午 15:00 起，曳舟周邊因隅田川煙火大會大管制。</strong> 必須中午前將行李拉到「京成上野站」寄放！", tag: "極重要" },
              { time: "13:00", title: "上野阿美橫町最後補貨", desc: "在上野作伴手禮零食、藥妝的最後大追加。" },
              { time: "16:00", title: "搭乘 Skyliner 直奔機場", desc: "從上野搭乘 Skyliner（車程41分）優雅前往成田機場。" },
              { time: "18:00", title: "成田機場辦理登機", desc: "辦理登機。再次確認：加熱菸與機器在登機前皆需處理掉，切勿帶回台灣。" }
            ]
          }
        ]);

        const currentDay = computed(() => itinerary.value[activeDay.value]);

        // 初始化地圖 (延遲以確保 DOM 完全渲染)
        const initMap = () => {
          setTimeout(() => {
            map = L.map('map').setView([35.6895, 139.6917], 10);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
              attribution: '© OpenStreetMap'
            }).addTo(map);

            // 強制地圖重新計算大小，防止顯示不全
            map.invalidateSize();
            updateMapRoute();
          }, 100);
        };

        // 更新地圖標記和連線
        const updateMapRoute = () => {
          if (!map) return;

          // 清除舊圖層
          mapLayers.forEach(layer => map.removeLayer(layer));
          mapLayers = [];

          const points = currentDay.value.mapPoints;
          if (!points || points.length === 0) return;

          const latlngs = [];

          points.forEach((pt, index) => {
            const latlng = [pt.lat, pt.lng];
            latlngs.push(latlng);

            // 建立地標標記
            const marker = L.marker(latlng).addTo(map);
            marker.bindPopup(`<b>${pt.name}</b>`);
            // 第一個點預設開啟泡泡
            if (index === 0) {
              marker.openPopup();
            }
            mapLayers.push(marker);
          });

          // 建立虛線軌跡
          const polyline = L.polyline(latlngs, {
            color: '#0d9488', // 墨綠色軌跡
            weight: 3,
            opacity: 0.8,
            dashArray: '6, 6'
          }).addTo(map);
          mapLayers.push(polyline);

          // 自動縮放至合適範圍
          const bounds = L.latLngBounds(latlngs);
          map.fitBounds(bounds, { padding: [40, 40] });
        };

        const changeDay = (index) => {
          activeDay.value = index;
          updateMapRoute();
        };

        onMounted(() => {
          initMap();
        });

        return {
          activeDay,
          isOpen,
          toggleSection,
          itinerary,
          currentDay,
          changeDay
        };
      }
    }).mount('#app');
  </script>
